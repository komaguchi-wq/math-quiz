<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>SAPIX算数演習</title>
<link rel="stylesheet" href="style.css">
</head>
<body>

<!-- ユーザー選択 -->
<div id="screen-user" class="screen active">
  <div class="screen-content center-content">
    <h1>SAPIX算数演習</h1>
    <p class="subtitle">ユーザーを選んでください</p>
    <div class="user-buttons">
      <button class="btn btn-large" onclick="selectUser('さと')">さと</button>
      <button class="btn btn-large" onclick="selectUser('ぱぱ')">ぱぱ</button>
    </div>
  </div>
</div>

<!-- カテゴリ選択 -->
<div id="screen-categories" class="screen">
  <header>
    <button class="btn-back" onclick="showScreen('screen-user')">← 戻る</button>
    <h2>カテゴリ</h2>
    <span class="user-badge" id="user-badge-cat"></span>
    <button class="btn-back" onclick="openSettings()" style="font-size:18px;">⚙️</button>
  </header>
  <div class="screen-content">
    <div id="category-list" class="card-list"></div>
  </div>
</div>

<!-- 単元一覧 -->
<div id="screen-units" class="screen">
  <header>
    <button class="btn-back" onclick="showScreen('screen-categories')">← 戻る</button>
    <h2 id="units-title">単元一覧</h2>
    <span class="user-badge" id="user-badge-units"></span>
  </header>
  <div class="screen-content">
    <div id="unit-list" class="card-list"></div>
  </div>
</div>

<!-- 単元詳細 -->
<div id="screen-unit-detail" class="screen">
  <header>
    <button class="btn-back" onclick="showScreen('screen-units')">← 戻る</button>
    <h2 id="unit-detail-title">単元詳細</h2>
    <span class="user-badge" id="user-badge-detail"></span>
  </header>
  <!-- 固定セクション（スクロールしない） -->
  <div class="detail-fixed-top">
    <div class="mode-section">
      <div class="mode-buttons">
        <button class="btn mode-btn active" data-mode="all" onclick="setFilter('all')">全ての問題</button>
        <button class="btn mode-btn" data-mode="below50" onclick="setFilter('below50')">正答率50%以下</button>
        <button class="btn mode-btn" data-mode="below67" onclick="setFilter('below67')">正答率67%以下</button>
        <button class="btn mode-btn" data-mode="below99" onclick="setFilter('below99')">正答率99%以下</button>
        <button class="btn mode-btn" data-mode="unanswered" onclick="setFilter('unanswered')">未解答問題</button>
      </div>
    </div>
    <h3>問題一覧</h3>
    <div id="accuracy-table-container"></div>
    <div class="action-buttons">
      <button class="btn btn-print-detail" onclick="printWithHighlights()">印刷</button>
      <button class="btn btn-answer-toggle" id="answer-toggle-btn" onclick="toggleDetailAnswer()">解答</button>
    </div>
  </div>

  <!-- スクロールセクション（ページ表示のみ） -->
  <div class="detail-scroll-area">
    <div id="question-pages-preview"></div>
  </div>
</div>


<!-- 設定画面 -->
<div id="screen-settings" class="screen">
  <header>
    <button class="btn-back" onclick="showScreen('screen-categories')">← 戻る</button>
    <h2>設定</h2>
  </header>
  <div style="padding: 24px; max-width: 600px;">
    <h3 style="margin-bottom: 12px;">Google Sheets バックアップ</h3>
    <p style="font-size: 13px; color: #8e8e93; margin-bottom: 12px;">
      Google Apps ScriptのデプロイURLを入力してください。<br>
      回答するたびにスプレッドシートに自動バックアップされます。
    </p>
    <input type="text" id="settings-url" placeholder="https://script.google.com/macros/s/..."
      style="width: 100%; padding: 12px; border: 1px solid #e0e0e0; border-radius: 8px; font-size: 14px; margin-bottom: 12px;">
    <div style="display: flex; flex-direction: column; gap: 10px;">
      <button class="btn btn-primary" onclick="saveSettings()">保存</button>
      <button class="btn btn-secondary" onclick="restoreFromSheets()">スプレッドシートから復元</button>
    </div>
  </div>
</div>

<!-- 印刷用 -->
<div id="print-container"></div>

<script src="app.js"></script>
</body>
</html>
